services:
  - type: web
    name: pii-shield
    runtime: python
    plan: free
    buildCommand: >
      pip install -e ".[api,excel]" &&
      pip install httpx pdfplumber python-docx python-pptx beautifulsoup4 lxml python-multipart
    startCommand: cd web_service && uvicorn app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: STANDALONE_MODE
        value: "true"
      - key: ENVIRONMENT
        value: "production"
      - key: LOG_LEVEL
        value: "WARNING"
      - key: PYTHON_VERSION
        value: "3.11.0"
