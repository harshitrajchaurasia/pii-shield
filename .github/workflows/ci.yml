name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dev dependencies
        run: pip install ruff black

      - name: Check formatting (black)
        run: black --check --diff src/ tests/ web_service/ api_service/

      - name: Lint (ruff)
        run: ruff check src/ tests/

  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install package with test dependencies
        run: pip install -e ".[dev,excel,api]"

      - name: Run tests
        run: pytest tests/ -v --tb=short --ignore=tests/test_service_integration.py --ignore=tests/test_api.py

      - name: Run tests with coverage
        run: pytest tests/ -v --cov=src/pi_remover --cov-report=term-missing --ignore=tests/test_service_integration.py --ignore=tests/test_api.py

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install -e ".[api,excel]"
          pip install mypy

      - name: Run mypy
        run: mypy src/pi_remover --ignore-missing-imports
