name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    continue-on-error: false
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install linter
        run: pip install ruff

      - name: Lint (ruff)
        run: ruff check src/ tests/ --output-format=github --select=F,E9

  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install package with test dependencies
        run: pip install -e ".[dev,excel,api]"

      - name: Run tests
        run: pytest tests/test_remover.py tests/test_edge_cases.py -v --tb=short

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    continue-on-error: false
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install -e ".[api,excel]"
          pip install mypy types-PyYAML

      - name: Run mypy
        run: mypy src/pi_remover
